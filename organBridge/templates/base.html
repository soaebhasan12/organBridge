<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OrganBridge{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="text-2xl font-bold text-red-600">🫀 OrganBridge</a>
                <div class="flex items-center gap-4">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-gray-600">{{ user.username }}</span>
                        <a href="{% url 'profiles:profile_dashboard' %}" class="text-sm text-blue-600 hover:underline">Dashboard</a>
                        <a href="{% url 'accounts:logout' %}" class="text-sm bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Logout</a>
                    {% else %}
                        <a href="{% url 'accounts:login' %}" class="text-sm text-blue-600 hover:underline">Login</a>
                        <a href="{% url 'accounts:register' %}" class="text-sm bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 mt-4">
        {% for message in messages %}
        <div class="p-3 mb-2 rounded text-sm
            {% if message.tags == 'success' %}bg-green-100 text-green-800
            {% elif message.tags == 'error' %}bg-red-100 text-red-800
            {% else %}bg-blue-100 text-blue-800{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
