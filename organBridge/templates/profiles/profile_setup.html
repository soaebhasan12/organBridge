{% extends 'base.html' %}

{% block title %}Profile Setup - OrganBridge{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Complete Your Profile</h2>
        <p class="text-gray-500 mb-6">You are registering as a <strong>{{ user.get_user_type_display }}</strong></p>

        <p class="text-center text-gray-500 py-8">Profile setup coming soon...</p>

        <a href="{% url 'profiles:profile_dashboard' %}"
           class="w-full block text-center bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
