{% extends 'base.html' %}

{% block title %}Sign In - OrganBridge{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">

        <!-- Header -->
        <div class="text-center mb-8">
            <span class="text-4xl">🫀</span>
            <h1 class="text-3xl font-black text-gray-900 mt-3">Welcome Back</h1>
            <p class="text-gray-500 mt-2">Sign in to your OrganBridge account</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <form method="POST">
                {% csrf_token %}
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                        <input type="text" name="username" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition"
                               placeholder="Enter your username">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition"
                               placeholder="Enter your password">
                    </div>
                </div>

                {% if form.errors %}
                <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-red-600 text-sm">Invalid username or password.</p>
                </div>
                {% endif %}

                <button type="submit"
                    class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition shadow-sm">
                    Sign In →
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account?
            <a href="{% url 'accounts:register' %}" class="text-blue-600 font-semibold hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
